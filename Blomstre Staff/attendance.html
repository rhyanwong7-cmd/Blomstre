<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Blomstre</title>
    <!-- Importing the brand's premium font library -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cinzel:wght@400;500&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfbfa; /* Warm off-white signature background */
            color: #1b4329; /* Deep forest green corporate brand text */
            min-height: 100vh;
        }

        /* --- Navigation Bar --- */
        nav {
            background-color: #ffffff;
            border-bottom: 1px solid #e8e6e3;
            padding: 20px 0;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            letter-spacing: 3px;
            font-weight: 500;
            color: #1b4329;
        }

        .nav-links a {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            color: #1b4329;
            margin-left: 25px;
            font-weight: 400;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        /* --- Main Content Center Layout --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .attendance-box {
            max-width: 650px;
            margin: 60px auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .attendance-box h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 56px;
            font-weight: 400;
            color: #1b4329;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: #556b5c;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 400;
            margin-bottom: 25px;
        }

        /* --- Live Real-Time Card Wrapper --- */
        .time-card {
            background-color: #ffffff;
            border: 1px solid #e8e6e3;
            padding: 12px 30px;
            border-radius: 30px;
            margin-bottom: 45px;
            box-shadow: 0 2px 10px rgba(27, 67, 41, 0.02);
        }

        #date-time {
            font-size: 15px;
            color: #1b4329;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* --- Action Dashboard Grid Cards --- */
        .attendance-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            width: 100%;
            margin-bottom: 30px;
        }

        .attendance-card {
            background-color: #1b4329; /* Signature brand deep green background */
            border: none;
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(27, 67, 41, 0.08);
        }

        .attendance-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(27, 67, 41, 0.18);
        }

        .attendance-card:active {
            transform: translateY(-1px);
        }

        /* Customizing Clock Out layout to be an outline button variant to contrast Clock In */
        #clock-out.attendance-card {
            background-color: #ffffff;
            border: 1px solid #1b4329;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        .icon {
            font-size: 32px;
            margin-bottom: 18px;
            line-height: 1;
        }

        .attendance-card h2 {
            font-family: 'Instrument Serif', serif;
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        #clock-in h2 { color: #fcfbfa; }
        #clock-out h2 { color: #1b4329; }

        .attendance-card p {
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        #clock-in p { color: #c9d6cd; }
        #clock-out p { color: #556b5c; }

        /* --- Dynamic Javascript Notification Status Message --- */
        #message {
            font-size: 14px;
            margin-top: 15px;
            font-weight: 400;
            color: #27ae60;
        }
    </style>
</head>
<body>

    <nav>
        <div class="navbar">
            <div class="logo">
                🕯 BLOMSTRE
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="attendance-box">
            <!-- Dynamic JavaScript Hook Parameters -->
            <h1 id="welcome">Welcome</h1>
            <p class="subtitle">Staff Attendance</p>

            <!-- Dynamic Live System Time Tracker Module -->
            <div class="time-card">
                <p id="date-time">Loading time...</p>
            </div>

            <!-- Attendance Grid Interface Layout -->
            <div class="attendance-buttons">
                <!-- Clock In Card -->
                <button id="clock-in" class="attendance-card">
                    <div class="icon">🌱</div>
                    <h2>Clock In</h2>
                    <p>Start your shift</p>
                </button>

                <!-- Clock Out Card -->
                <button id="clock-out" class="attendance-card">
                    <div class="icon">🌙</div>
                    <h2>Clock Out</h2>
                    <p>End your shift</p>
                </button>
            </div>

            <!-- Dynamic Action Confirmation Notification Feedback Box -->
            <p id="message"></p>
        </div>
    </div>

    <!-- System JavaScript Hooks -->
    <script src="js/api.js"></script>
    <script src="js/attendance.js"></script>
</body>
</html>
